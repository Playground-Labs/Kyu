name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    permissions:
      contents: write   # tauri-action needs this to create the GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Cross-compile x86_64 on the Apple-Silicon runner; macos-13 Intel
          # runners never get scheduled for this repo.
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      # Gate the release on the test suites before anything is built or uploaded.
      - name: Frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --no-default-features

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID signing + notarization. If these secrets are unset the
          # build still succeeds (ad-hoc signed) — see docs/RELEASE.md to enable.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kyu ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # Once both DMGs are on the release, bump the Homebrew tap to match. Needs a
  # token that can write to the tap repo (GITHUB_TOKEN only covers this repo):
  # a fine-grained PAT with Contents:Read/Write on Playground-Labs/homebrew-kyu,
  # stored as the HOMEBREW_TAP_TOKEN secret. If it's unset this job fails while
  # the release itself stays published.
  update-homebrew-cask:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: Playground-Labs/homebrew-kyu
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Bump the cask to the released version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"

          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir "$RUNNER_TEMP" \
            --pattern "Kyu_${version}_aarch64.dmg" \
            --pattern "Kyu_${version}_x64.dmg"

          export version
          export arm_sha=$(sha256sum "$RUNNER_TEMP/Kyu_${version}_aarch64.dmg" | cut -d' ' -f1)
          export intel_sha=$(sha256sum "$RUNNER_TEMP/Kyu_${version}_x64.dmg" | cut -d' ' -f1)

          # 64-hex anchors keep the sha lines off the `arch ... intel: "x64"` line.
          perl -0777 -pi -e '
            s/^(  version )"[^"]*"/$1"$ENV{version}"/m;
            s/(sha256 arm:\s*)"[0-9a-f]{64}"/$1"$ENV{arm_sha}"/;
            s/(intel:\s*)"[0-9a-f]{64}"/$1"$ENV{intel_sha}"/;
          ' Casks/kyu.rb

          if git diff --quiet; then
            echo "Cask already at ${version}; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "kyu ${version}"
          git push
