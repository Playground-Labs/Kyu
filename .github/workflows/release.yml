name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    permissions:
      contents: write   # tauri-action needs this to create the GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Cross-compile x86_64 on the Apple-Silicon runner; macos-13 Intel
          # runners never get scheduled for this repo.
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      # Gate the release on the test suites before anything is built or uploaded.
      - name: Frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --no-default-features

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID signing + notarization. If these secrets are unset the
          # build still succeeds (ad-hoc signed) — see docs/RELEASE.md to enable.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kyu ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
